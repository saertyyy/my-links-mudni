<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Библиотека | Steam Style</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header>
        <div class="header-content">
            <div class="logo">ПЛАТФОРМА</div>
            <nav>
                <a href="index.html">МАГАЗИН</a>
                <a href="library.html" class="active">БИБЛИОТЕКА</a>
                <a href="index.html">МОИ ССЫЛКИ</a>
                <a href="#">СООБЩЕСТВО</a>
            </nav>
            <div class="user-block">
                <span class="user-balance">0.00$</span>
                <span class="user-name">USER_1337</span>
                <img src="https://via.placeholder.com/34" alt="Avatar" class="avatar">
            </div>
        </div>
    </header>

    <main>
        <div class="container">
            <h1 class="main-title">Моя библиотека скриншотов</h1>
            
            <div class="library-grid">
                <div class="library-item">
                    <img src="image1.png" alt="Скриншот 1">
                    <p>Фигура Шута на механическом пауке</p>
                </div>
                <div class="library-item">
                    <img src="image2.png" alt="Скриншот 2">
                    <p>Шут в Дата-центре</p>
                </div>
            </div>

            <div style="margin-top: 30px;">
                <a href="index.html" style="color: #67c1f5; text-decoration: none; font-size: 14px;">
                    <i class="fas fa-arrow-left"></i> Назад к ссылкам
                </a>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <div class="footer-logo">STEAM<sup>®</sup></div>
            <p>© 2026. Страница библиотеки.</p>
        </div>
    </footer>

</body>
</html>
