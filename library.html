<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Библиотека | Steam Style</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header>
        <div class="header-content">
            <i class="fas fa-gamepad logo-icon"></i> Моё Инфо
            <nav>
                <a href="pc.html">МОЙ ПК</a>
                <a href="library.html" class="active">БИБЛИОТЕКА</a>
                <a href="index.html">МОИ ССЫЛКИ</a>
                <a href="community.html">РЕКОМЕНДОВАННЫЕ МНОЙ ТЕЛЕФОНЫ</a>
            </nav>
            <div class="user-block">
                <span class="user-balance">0.00$</span>
                <span class="user-name">saertyyy</span>
                <img src="avatar.png" alt="Avatar" class="avatar" width="34" height="34">
            </div>
        </div>
    </header>

    <main>
        <div class="container">
            <h1 class="main-title">Моя библиотека скриншотов</h1>
            
            <div class="library-grid">
                <div class="library-item">
                    <img src="image1.png" alt="Скриншот 1">
                    <p>Фигура Шута на механическом пауке</p>
                </div>
                <div class="library-item">
                    <img src="image2.png" alt="Скриншот 2">
                    <p>Шут в Дата-центре</p>
                </div>
            </div>

            <div style="margin-top: 30px;">
                <a href="index.html" style="color: #67c1f5; text-decoration: none; font-size: 14px;">
                    <i class="fas fa-arrow-left"></i> Назад к ссылкам
                </a>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <div class="footer-logo">STEAM<sup>®</sup></div>
            <p>© 2026. Страница библиотеки.</p>
        </div>
    </footer>
<div id="image-modal" class="modal hidden">
        <span class="modal-close">&times;</span>
        <img class="modal-content" id="modal-img">
        <div id="modal-caption" class="modal-caption"></div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const modal = document.getElementById('image-modal');
            const modalImg = document.getElementById('modal-img');
            const captionText = document.getElementById('modal-caption');
            const closeBtn = document.querySelector('.modal-close');

            // Находим все картинки в галерее
            const images = document.querySelectorAll('.library-item img');

            // Для каждой картинки добавляем событие "клик"
            images.forEach(img => {
                img.addEventListener('click', function() {
                    // 1. Показываем модальное окно
                    modal.classList.remove('hidden');
                    // 2. Подставляем адрес кликнутой картинки в окно
                    modalImg.src = this.src;
                    // 3. Подставляем текст из атрибута 'alt' как подпись
                    captionText.textContent = this.alt;
                });
            });

            // Настройка закрытия окна
            function closeModal() {
                modal.classList.add('hidden');
            }

            // Закрытие при клике на крестик
            if (closeBtn) closeBtn.addEventListener('click', closeModal);

            // Закрытие при клике на тёмный фон окна (мимо картинки)
            window.addEventListener('click', function(e) {
                if (e.target === modal) {
                    closeModal();
                }
            });

            // Закрытие при нажатии клавиши Esc (для удобства)
            window.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && !modal.classList.contains('hidden')) {
                    closeModal();
                }
            });
        });
    </script>
</body>
</html>
