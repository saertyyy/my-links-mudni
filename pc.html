<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Steam Profile - Мой ПК</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body onload="document.body.classList.add('loaded')">
    <header>
        <div class="header-content">
            <div class="logo"><i class="fab fa-steam logo-icon"></i> STEAM</div>
            <nav>
                <a href="index.html">Об активностях</a>
                <a href="pc.html" class="active">Мой ПК</a>
                <a href="phones.html">Топ флагманов</a>
                <a href="library.html">Библиотека</a>
            </nav>
            <div class="user-block">
                <span class="user-balance">0.71$</span>
                <img src="avatar.jpg" class="avatar" alt="Avatar">
            </div>
        </div>
    </header>

    <div class="container">
        <h1 class="main-title">Конфигурация системы</h1>
        
        <div class="cpu-graph-container">
            <div class="graph-header">
                <span>НАГРУЗКА СИСТЕМЫ (CPU)</span>
                <span id="cpu-percent">5%</span>
            </div>
            <canvas id="cpuGraph"></canvas>
        </div>

        <div class="pc-specs-grid">
            <div class="spec-item">
                <div class="spec-label"><i class="fas fa-microchip"></i> ПРОЦЕССОР</div>
                <div class="spec-value">AMD Ryzen 5 5600X</div>
            </div>
            <div class="spec-item">
                <div class="spec-label"><i class="fas fa-video"></i> ВИДЕОКАРТА</div>
                <div class="spec-value">NVIDIA GeForce GTX 1070Ti 8GB</div>
            </div>
            <div class="spec-item">
                <div class="spec-label"><i class="fas fa-memory"></i> ОЗУ</div>
                <div class="spec-value">16 GB DDR4 3200MHz</div>
            </div>
            <div class="spec-item">
                <div class="spec-label"><i class="fas fa-hdd"></i> НАКОПИТЕЛЬ</div>
                <div class="spec-value">5 дисков (HDD, SSD, NVMe)</div>
            </div>
            <div class="spec-item">
                <div class="spec-label"><i class="fas fa-tv"></i> МОНИТОР</div>
                <div class="spec-value">27" Full HD 200Hz IPS</div>
            </div>
        </div>
        <br>
        <a href="index.html" style="color: #67c1f5; text-decoration: none;">← Назад к ссылкам</a>
    </div>

    <script src="script.js"></script>
</body>
</html>
