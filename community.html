<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сообщество | Топ флагманы</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div id="particles-js"></div>
    <div class="scroll-progress"></div>

    <header>
        <div class="header-content">
            <div class="logo"><i class="fas fa-gamepad logo-icon"></i> Моё Инфо</div>
            <nav>
                <a href="pc.html">МОЙ ПК</a>
                <a href="library.html">БИБЛИОТЕКА</a>
                <a href="index.html">МОИ ССЫЛКИ</a>
                <a href="community.html" class="active">Топ флагманы</a>
            </nav>
            <div class="user-block">
                <span class="user-balance">0.00$</span>
                <span class="user-name">saertyyy</span><span class="status-dot"></span>
                <img src="avatar.png" alt="Avatar" class="avatar" width="34" height="34">
            </div>
        </div>
    </header>

    <main>
        <div class="container">
            <h1 class="main-title">Мой топ флагманов 2026</h1>
            <div class="phone-grid">
                <div class="phone-card samsung">
                    <i class="fas fa-mobile-alt"></i>
                    <h3>Samsung S26 Ultra</h3>
                    <p>Будущий король производительности</p>
                    <a href="https://www.ozon.ru/search/?text=Samsung+S26+Ultra" target="_blank" class="ozon-btn">Купить на OZON</a>
                </div>
                <div class="phone-card xiaomi">
                    <i class="fas fa-mobile-alt"></i>
                    <h3>Xiaomi 15 Ultra</h3>
                    <p>Лучшая камера для энтузиастов</p>
                    <a href="https://www.ozon.ru/search/?text=Xiaomi+15+Ultra" target="_blank" class="ozon-btn">Купить на OZON</a>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <p>© 2026. Этот сайт создал я. Всем приууээээт</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="particles-config.js"></script>
    <script src="clicker.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            document.body.classList.add('loaded'); // ПРОЯВЛЕНИЕ СТРАНИЦЫ
            window.onscroll = function() {
                let winScroll = document.body.scrollTop || document.documentElement.scrollTop;
                let height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
                let scrolled = (winScroll / height) * 100;
                document.querySelector(".scroll-progress").style.width = scrolled + "%";
            };
        });
    </script>
</body>
</html>
